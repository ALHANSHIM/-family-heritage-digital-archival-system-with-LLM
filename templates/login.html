<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin Login — UAE Heritage Archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap"/>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body class="login-body">

<div class="login-geo"></div>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo-ar">تراث</div>
      <div class="login-logo-en">UAE Heritage Archive</div>
      <div class="login-divider"></div>
      <p class="login-sub">Admin Access &nbsp;·&nbsp; دخول المدير</p>
    </div>

    <form method="POST" action="{{ url_for('login') }}" class="login-form">
      <div class="form-group">
        <label class="form-label">
          Access Code &nbsp;
          <span style="font-family:'Amiri',serif; font-size:0.9rem; opacity:0.7;">رمز الدخول</span>
        </label>
        <input
          type="password"
          name="password"
          class="form-input form-input--center {% if error %}form-input--error{% endif %}"
          placeholder="Enter access code..."
          autofocus
          autocomplete="current-password"
        />
        {% if error %}
        <div class="form-error">{{ error }}</div>
        {% endif %}
      </div>
      <button type="submit" class="btn btn--gold btn--full">
        Enter Archive &nbsp; دخول الأرشيف
      </button>
    </form>

    <div class="login-footer">
      <a href="{{ url_for('index') }}" class="login-back">
        &larr; Return to public archive
      </a>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
